<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brenna Kark | Engineering Portfolio</title>
    <style>
        * {
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            background: radial-gradient(circle at top, #1b1b1b 0%, #0a0a0a 45%, #050505 100%);
            color: white;
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(10, 10, 10, 0.78);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 18px 20px;
            display: flex;
            justify-content: center;
            gap: 28px;
            flex-wrap: wrap;
        }

        nav a {
            color: #d6d6d6;
            text-decoration: none;
            font-size: 15px;
            transition: color 0.25s ease;
        }

        nav a:hover {
            color: white;
        }

        .hero {
            text-align: center;
            padding: 120px 20px 90px;
            max-width: 1000px;
            margin: 0 auto;
            animation: fadeUp 1s ease;
        }

        /* 🔥 HEADSHOT STYLE */
        .headshot {
            width: 160px;
            height: 160px;
            object-fit: cover;
            border-radius: 50%;
            display: block;
            margin: 0 auto 20px;
            border: 3px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 25px rgba(77,166,255,0.4);
            transition: transform 0.3s ease;
        }

        .headshot:hover {
            transform: scale(1.05);
        }

        .hero-badge {
            display: inline-block;
            padding: 10px 18px;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 999px;
            background: rgba(255,255,255,0.04);
            color: #d8d8d8;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .hero h1 {
            font-size: 72px;
            line-height: 1;
            margin: 0 0 16px;
            letter-spacing: -2px;
        }

        .hero p {
            max-width: 760px;
            margin: 0 auto;
            color: #c8c8c8;
            font-size: 21px;
            line-height: 1.7;
        }

        .button-row {
            margin-top: 34px;
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            padding: 14px 24px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.25s ease, opacity 0.25s ease, background 0.25s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-primary {
            background: white;
            color: black;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.06);
            color: white;
            border: 1px solid rgba(255,255,255,0.12);
        }

        .section {
            max-width: 1120px;
            margin: 0 auto;
            padding: 70px 20px;
        }

        .section-title {
            text-align: center;
            font-size: 38px;
            margin: 0 0 28px;
            letter-spacing: -1px;
        }

        .section-subtitle {
            text-align: center;
            color: #bdbdbd;
            max-width: 760px;
            margin: 0 auto 30px;
            line-height: 1.7;
        }

        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 18px 50px rgba(0,0,0,0.28);
        }

        .about-text {
            color: #d2d2d2;
            line-height: 1.8;
            font-size: 18px;
            text-align: center;
            max-width: 900px;
            margin: 0 auto;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 22px;
            margin-top: 24px;
        }

        .project-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 22px;
            padding: 24px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .project-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 22px 45px rgba(0,0,0,0.32);
        }

        .project-card h3 {
            margin-top: 0;
            font-size: 24px;
        }

        .project-card p {
            color: #d0d0d0;
            line-height: 1.7;
        }

        .project-link {
            display: inline-block;
            margin-top: 10px;
            color: #87c2ff;
            text-decoration: none;
            font-weight: 600;
        }

        .project-link:hover {
            text-decoration: underline;
        }

        .featured-images {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin: 24px 0 8px;
        }

        .featured-images div {
            background: rgba(255,255,255,0.04);
            border-radius: 18px;
            padding: 10px;
        }

        .featured-images img {
            width: 100%;
            display: block;
            border-radius: 14px;
            transition: transform 0.28s ease, opacity 0.28s ease;
        }

        .featured-images img:hover {
            transform: scale(1.03);
            opacity: 0.95;
        }

        .featured-images p {
            margin: 10px 0 4px;
            text-align: center;
            color: #d0d0d0;
            font-size: 14px;
        }

        .skills-list {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }

        .skill-pill {
            padding: 10px 16px;
            border-radius: 999px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            color: #e5e5e5;
            font-size: 15px;
        }

        .resume-box, .contact-box {
            text-align: center;
        }

        .resume-box p, .contact-box p {
            color: #d2d2d2;
            font-size: 18px;
        }

        .contact-box a {
            color: #87c2ff;
            text-decoration: none;
        }

        .contact-box a:hover {
            text-decoration: underline;
        }

        footer {
            text-align: center;
            color: #8a8a8a;
            padding: 35px 20px 55px;
            font-size: 14px;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(28px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 760px) {
            .hero h1 {
                font-size: 50px;
            }

            .hero p {
                font-size: 18px;
            }

            .featured-images {
                grid-template-columns: 1fr;
            }

            .section-title {
                font-size: 30px;
            }
        }
    </style>
</head>
<body>

<nav>
    <ul>
        <li><a href="#about">About</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#skills">Skills</a></li>
        <li><a href="#resume">Resume</a></li>
        <li><a href="#contact">Contact</a></li>
    </ul>
</nav>

<section class="hero">
    <img src="headshot.jpg" class="headshot">

    <div class="hero-badge">Engineering Portfolio</div>
    <h1>Brenna Kark</h1>
    <p>
        Mechanical Manufacturing Engineering Technology student with hands-on experience in CNC machining, CAD/CAM, robotics, circuits, and cybersecurity.
    </p>
    <div class="button-row">
        <a class="btn btn-primary" href="Brenna_Kark_Resume.pdf" target="_blank">Download Resume</a>
        <a class="btn btn-secondary" href="#projects">View Projects</a>
    </div>
</section>
